name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install uv

      - name: Compile
        run: uv run python -m compileall src

      - name: CLI help
        run: uv run agent-insights --help

      - name: CLI version
        run: uv run agent-insights --version

      - name: Dry run
        run: uv run agent-insights report --dry-run --skip-facets

      - name: Check cask renderer
        run: |
          uv run python scripts/render-homebrew-cask.py \
            /tmp/agent-insights-cli.rb \
            0.0.0-test \
            aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa \
            bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
          test -s /tmp/agent-insights-cli.rb
